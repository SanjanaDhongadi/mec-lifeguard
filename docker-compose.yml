# MEC-LifeGuard — Docker Compose
# Starts 3 identical edge node containers on different host ports.
# All 3 read from the same mobility_state.json via a shared bind mount.
#
# Usage:
#   docker compose up --build        # first time
#   docker compose up                # subsequent runs
#   docker compose down              # stop and remove containers

version: "3.9"

services:

  edge-node-1:
    build: ./edge_node
    container_name: edge-node-1
    environment:
      - NODE_ID=node1
    ports:
      - "5001:5000"
    volumes:
      - ./mobility_simulator:/shared:ro
    restart: unless-stopped

